name: Sync to personal repo
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Push to personal repo
        env:
          TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          git remote set-url origin https://ethossustainability:${TOKEN}@github.com/ethossustainability/ethosdashboard.git
          GIT_CURL_VERBOSE=1 git push origin HEAD:main --force 2>&1 | head -50
