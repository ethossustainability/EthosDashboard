name: Sync to personal repo
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check token permissions
        env:
          TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          curl -s -H "Authorization: token ${TOKEN}" \
            https://api.github.com/repos/ethossustainability/ethosdashboard \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('permissions:', d.get('permissions')); print('private:', d.get('private'))"
